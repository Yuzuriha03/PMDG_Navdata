# PMDG NavData Rust CLI example configuration
# Rename this file to config.ini, place it next to the executable, and fill in your local paths before running the CLI.

[paths]
# NAIP CSV directory
NAIP_PATH =

# Output SQLite database path
DB_OUTPUT_PATH =

# Master database path
MASTER_NDB_PATH =

# X-Plane data directory. If set, CIFP_PATH / PATH_TO_FIX_DAT / PATH_TO_NAV_DAT may be relative.
XPLANE_PATH =

# CIFP directory path (relative to XPLANE_PATH or absolute)
CIFP_PATH = CIFP

# earth_fix.dat path (relative to XPLANE_PATH or absolute)
PATH_TO_FIX_DAT = earth_fix.dat

# earth_nav.dat path (relative to XPLANE_PATH or absolute)
PATH_TO_NAV_DAT = earth_nav.dat

# Optional CSV overrides. Leave commented to auto-resolve from NAIP_PATH.
# PATH_TO_RWY_DIRECTION_CSV =
# PATH_TO_RWY_CSV =
# PATH_TO_AD_HP_CSV =
# PATH_TO_RTE_SEG_CSV =
# PATH_TO_VOR_CSV =
# PATH_TO_NDB_CSV =